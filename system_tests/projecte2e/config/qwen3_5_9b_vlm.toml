# Selfware E2E Configuration for Qwen 3.5-9B VLM (LM Studio)
#
# Hardware: Apple Mac M2 Max, 96 GB unified RAM
# Backend:  LM Studio (llama.cpp)
# Model:    qwen/qwen3.5-9b (q8 quantization, k/v cache q8)
# Context:  262144 tokens
# Concurrency: 4 parallel predictions

endpoint = "http://192.168.1.99:1234/v1"
model = "qwen/qwen3.5-9b"
max_tokens = 16384
temperature = 0.2

[safety]
allowed_paths = ["./**", "/tmp/selfware/**"]
denied_paths = ["**/.git/**"]
require_confirmation = []

[agent]
max_iterations = 500
step_timeout_secs = 1200
token_budget = 240000
native_function_calling = false
streaming = true

[yolo]
enabled = true
max_operations = 500
max_hours = 8.0
allow_git_push = false
allow_destructive_shell = false
audit_log_path = "./e2e-audit.log"
status_interval = 25

[continuous_work]
enabled = true
checkpoint_interval_tools = 10
checkpoint_interval_secs = 300
auto_recovery = true
max_recovery_attempts = 5

[retry]
max_retries = 8
base_delay_ms = 1000
max_delay_ms = 30000

[resources]
[resources.gpu]
monitor_interval_seconds = 10
temperature_threshold = 90
memory_utilization_threshold = 0.95
throttle_on_overheat = true

[resources.memory]
warning_threshold = 0.8
critical_threshold = 0.9
emergency_threshold = 0.95
monitor_interval_seconds = 10

[resources.disk]
max_usage_percent = 0.9
maintenance_interval_seconds = 3600
compress_after_days = 1

[resources.quotas]
max_gpu_memory_per_model = 96_000_000_000
max_concurrent_requests = 4
max_context_tokens = 262144
max_queued_tasks = 1000
max_checkpoint_size = 2_000_000_000
