[config]
# Coverage threshold — 80% of testable code
# Excluded: main.rs (CLI entry), system_tests templates (test fixtures),
# TUI rendering code (requires terminal/display, tested manually),
# interactive REPL (requires terminal), CLI arg parsing (entry point),
# terminal input handling, system resource monitors (need /proc/disk),
# terminal output formatting, screen capture (needs display server),
# hot reload (requires running dev servers), evolution sandbox (requires
# Docker/chroot), evolution tournament (multi-process orchestration).
fail-under = 80
# Output formats
out = ["Html", "Stdout", "Xml"]
# Line coverage mode
line-coverage = true
# Branch coverage
branch-coverage = true
# Exclude non-testable code from coverage measurement
exclude-files = [
    "src/main.rs",
    "system_tests/*",
    "src/ui/*",
    "src/agent/interactive.rs",
    "src/cli.rs",
    "src/input/mod.rs",
    "src/resource/*",
    "src/output/*",
    "src/tools/screen_capture.rs",
    "src/tools/hot_reload.rs",
    "src/evolution/sandbox.rs",
    "src/evolution/tournament.rs",
]
